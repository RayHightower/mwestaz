<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meridian West Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        .hero {
            background: url('MWestAZ_20260713.gif') center/cover no-repeat;
            height: 100vh;
            min-height: 600px;
            position: relative;
        }
        
        .scroll-indicator {
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20% { transform: translateY(0); }
            50% { transform: translateY(10px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-white text-black">
    
    <!-- HERO -->
    <section class="hero flex items-center justify-center relative">
        <!-- Dark overlay for better text readability -->
        <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60"></div>
        
        <div class="relative z-10 text-center px-6 max-w-2xl mx-auto">
            <h1 class="text-5xl md:text-6xl font-semibold tracking-tighter text-white mb-8">
                MERIDIAN WEST<br>DEVELOPMENT, LLC
            </h1>
        </div>

        <!-- Scroll Prompt -->
        <div class="absolute bottom-12 left-1/2 transform -translate-x-1/2 flex flex-col items-center text-white/80 z-20">
            <div class="text-xs tracking-[2px] font-medium mb-3">MORE INFORMATION BELOW</div>
            <div class="scroll-indicator">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-9-9m0 0L5 5" />
                </svg>
            </div>
        </div>
    </section>

    <!-- CONTACT INFORMATION -->
    <section class="py-20 bg-white">
        <div class="max-w-md mx-auto text-center px-6">
            <div class="space-y-8">
                <div>
                    <p class="text-2xl font-medium">Meridian West Development, LLC</p>
                </div>
                
                <div class="h-px bg-gray-200 w-16 mx-auto"></div>
                
                <div class="space-y-6 text-lg">
                    <p>
                        PO Box 15270<br>
                        Phoenix, Arizona 85060
                    </p>
                    
                    <p>
                        <a href="tel:6029120777" class="hover:underline">
                            602.912.0777
                        </a>
                    </p>
                    
                    <p>
                        Inquiries:<br>
                        <a href="mailto:kdeisner@mwestaz.com" class="hover:underline">
                            kdeisner@mwestaz.com
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-black text-white py-8 text-center text-sm">
        <div class="max-w-md mx-auto px-6">
            © 2026 Meridian West Development, LLC • Phoenix, Arizona
        </div>
    </footer>

    <script>
        // Smooth scrolling if needed
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
